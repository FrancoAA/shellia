<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shellia</title>
<style>
  :root {
    --bg: #1a1b26;
    --bg-secondary: #24283b;
    --bg-input: #1f2335;
    --text: #c0caf5;
    --text-muted: #565f89;
    --accent: #7aa2f7;
    --accent-dim: #3d59a1;
    --user-bg: #283457;
    --assistant-bg: #1f2335;
    --border: #292e42;
    --error: #f7768e;
    --success: #9ece6a;
    --warning: #e0af68;
    --code-bg: #16161e;
    --scrollbar: #292e42;
    --scrollbar-hover: #3b4261;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }

  .header .version {
    font-size: 11px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .status-dot.disconnected { background: var(--error); }
  .status-dot.thinking { background: var(--warning); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.15s;
  }

  .btn-icon:hover {
    border-color: var(--accent-dim);
    color: var(--text);
    background: var(--bg);
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message.error {
    align-self: center;
    background: none;
    color: var(--error);
    font-size: 12px;
    padding: 8px;
  }

  .message .role-label {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .message.user .role-label { color: var(--accent); }
  .message.assistant .role-label { color: var(--success); }

  /* Tool call indicator */
  .tool-call {
    font-size: 12px;
    color: var(--warning);
    padding: 6px 12px;
    background: var(--code-bg);
    border-radius: 6px;
    border-left: 3px solid var(--warning);
    align-self: flex-start;
    max-width: 85%;
  }

  .tool-call .label { font-weight: 600; }

  /* Thinking indicator */
  .thinking {
    align-self: flex-start;
    color: var(--text-muted);
    font-size: 13px;
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .thinking-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: dot-bounce 1.4s infinite ease-in-out;
  }

  .thinking-dots span:nth-child(1) { animation-delay: 0s; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Markdown rendering */
  .message code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  .message pre {
    background: var(--code-bg);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid var(--border);
  }

  .message pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .message p { margin: 4px 0; }
  .message p:first-child { margin-top: 0; }
  .message p:last-child { margin-bottom: 0; }

  .message ul, .message ol {
    padding-left: 20px;
    margin: 4px 0;
  }

  .message strong { color: var(--accent); font-weight: 600; }

  .message a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-dim);
  }

  .message a:hover { border-bottom-color: var(--accent); }

  .message blockquote {
    border-left: 3px solid var(--accent-dim);
    padding-left: 12px;
    color: var(--text-muted);
    margin: 8px 0;
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  .welcome h2 {
    color: var(--accent);
    font-size: 20px;
    font-weight: 600;
  }

  .welcome p {
    font-size: 13px;
    max-width: 400px;
    line-height: 1.6;
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 900px;
    margin: 0 auto;
  }

  .input-wrapper textarea {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 200px;
    transition: border-color 0.15s;
  }

  .input-wrapper textarea:focus {
    border-color: var(--accent-dim);
  }

  .input-wrapper textarea::placeholder {
    color: var(--text-muted);
  }

  .send-btn {
    background: var(--accent);
    border: none;
    color: var(--bg);
    width: 44px;
    height: 44px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.02); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .message { max-width: 95%; }
    .header { padding: 10px 14px; }
    .messages { padding: 14px; gap: 12px; }
    .input-area { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="status-dot" id="statusDot"></span>
    <h1>shellia</h1>
    <span class="version">web</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="resetChat()" title="New conversation">reset</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h2>shellia</h2>
    <p>Terminal agent accessible via web. Type a message to start a conversation.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="input"
      placeholder="Type a message..."
      rows="1"
      autofocus
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#x27A4;</button>
  </div>
</div>

<script>
(function() {
  // --- State ---
  let sessionId = localStorage.getItem('shellia_session_id') || generateId();
  let isStreaming = false;

  localStorage.setItem('shellia_session_id', sessionId);

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const welcomeEl = document.getElementById('welcome');

  // --- Event Listeners ---
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', autoResize);

  // --- Functions ---
  function generateId() {
    return 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  }

  function setStatus(status) {
    statusDot.className = 'status-dot' + (status ? ' ' + status : '');
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, content) {
    if (welcomeEl) welcomeEl.remove();

    const div = document.createElement('div');
    div.className = 'message ' + role;

    const label = document.createElement('div');
    label.className = 'role-label';
    label.textContent = role === 'user' ? 'you' : 'shellia';
    div.appendChild(label);

    const body = document.createElement('div');
    body.className = 'content';
    if (role === 'assistant') {
      body.innerHTML = renderMarkdown(content);
    } else {
      body.textContent = content;
    }
    div.appendChild(body);

    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addThinking() {
    if (welcomeEl) welcomeEl.remove();

    const div = document.createElement('div');
    div.className = 'thinking';
    div.id = 'thinking';
    div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div> Thinking...';
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  function addToolCall(info) {
    const div = document.createElement('div');
    div.className = 'tool-call';
    div.innerHTML = '<span class="label">$ </span>' + escapeHtml(info);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addError(msg) {
    const div = document.createElement('div');
    div.className = 'message error';
    div.textContent = msg;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  // --- Markdown Rendering (basic) ---
  function renderMarkdown(text) {
    if (!text) return '';

    // Escape HTML first
    let html = escapeHtml(text);

    // Code blocks (``` ... ```)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Blockquotes
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered lists
    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

    // Headers
    html = html.replace(/^### (.+)$/gm, '<strong>$1</strong>');
    html = html.replace(/^## (.+)$/gm, '<strong>$1</strong>');
    html = html.replace(/^# (.+)$/gm, '<strong>$1</strong>');

    // Paragraphs (double newline)
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';

    // Single newlines to <br> (but not inside pre/code)
    html = html.replace(/(?<!<\/pre>|<\/code>)\n(?!<)/g, '<br>');

    // Clean up empty paragraphs
    html = html.replace(/<p>\s*<\/p>/g, '');

    return html;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // --- API ---
  window.sendMessage = async function() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoResize();

    addMessage('user', text);
    const thinkingEl = addThinking();
    setStatus('thinking');

    let responseText = '';
    let assistantEl = null;
    let thinkingRemoved = false;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!response.ok) {
        throw new Error('Server error: ' + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6);
          if (!jsonStr) continue;

          try {
            const event = JSON.parse(jsonStr);
            handleEvent(event);
          } catch (e) {
            // Ignore malformed events
          }
        }
      }
    } catch (err) {
      removeThinking();
      addError('Connection error: ' + err.message);
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      setStatus('');
      inputEl.focus();
    }

    function handleEvent(event) {
      switch (event.type) {
        case 'session':
          if (event.session_id) {
            sessionId = event.session_id;
            localStorage.setItem('shellia_session_id', sessionId);
          }
          break;

        case 'status':
          if (event.status === 'thinking') {
            setStatus('thinking');
          }
          break;

        case 'tool_call':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          addToolCall(event.command || event.name || 'tool call');
          setStatus('thinking');
          break;

        case 'text':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          responseText += (responseText ? '\n' : '') + event.content;
          if (!assistantEl) {
            assistantEl = addMessage('assistant', responseText);
          } else {
            const contentEl = assistantEl.querySelector('.content');
            contentEl.innerHTML = renderMarkdown(responseText);
            scrollToBottom();
          }
          break;

        case 'error':
          removeThinking();
          thinkingRemoved = true;
          addError(event.message || 'Unknown error');
          break;

        case 'done':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          setStatus('');
          break;

        case 'close':
          setStatus('');
          break;
      }
    }
  };

  window.resetChat = async function() {
    try {
      await fetch('/api/chat/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch (e) {
      // Ignore errors
    }

    sessionId = generateId();
    localStorage.setItem('shellia_session_id', sessionId);

    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <h2>shellia</h2>
        <p>Terminal agent accessible via web. Type a message to start a conversation.</p>
      </div>
    `;
  };

  // --- Health check ---
  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      if (r.ok) {
        setStatus('');
      } else {
        setStatus('disconnected');
      }
    } catch (e) {
      setStatus('disconnected');
    }
  }

  checkHealth();
  setInterval(checkHealth, 30000);
})();
</script>
</body>
</html>
