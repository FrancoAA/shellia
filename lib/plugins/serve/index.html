<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shellia</title>
<style>
  :root {
    --bg: #212121;
    --bg-secondary: #252525;
    --bg-darker: #121212;
    --bg-input: #1a1a1a;
    --text: #e0e0e0;
    --text-muted: #6a6a6a;
    --text-emphasized: #e5c07b;
    --primary: #fab283;
    --secondary: #5c9cf5;
    --accent: #9d7cd8;
    --border: #4b4c5c;
    --border-dim: #303030;
    --error: #e06c75;
    --success: #7fd88f;
    --warning: #f5a742;
    --info: #56b6c2;
    --code-bg: #1a1a1a;
    --scrollbar: #303030;
    --scrollbar-hover: #4b4c5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Menlo', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg-darker);
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.5px;
  }

  .header .version {
    font-size: 11px;
    color: var(--text-muted);
    padding: 1px 6px;
    background: var(--bg-secondary);
    border-radius: 3px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border-dim);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.15s;
  }

  .btn-icon:hover {
    border-color: var(--border);
    color: var(--text);
    background: var(--bg-secondary);
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  /* Messages: left-border style */
  .message {
    padding: 10px 16px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
    border-left: 3px solid transparent;
    max-width: 100%;
  }

  .message.user {
    border-left-color: var(--secondary);
  }

  .message.assistant {
    border-left-color: var(--primary);
  }

  .message.error {
    border-left-color: var(--error);
    color: var(--error);
    font-size: 13px;
    padding: 8px 16px;
  }

  .message .role-label {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .message.user .role-label { color: var(--secondary); }
  .message.assistant .role-label { color: var(--primary); }

  /* Tool call indicator */
  .tool-call {
    font-size: 13px;
    color: var(--text-muted);
    padding: 6px 16px;
    border-left: 3px solid var(--text-muted);
    max-width: 100%;
  }

  .tool-call .label {
    font-weight: 700;
    color: var(--warning);
  }

  /* Thinking indicator */
  .thinking {
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    padding: 8px 16px;
    border-left: 3px solid var(--primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .thinking-dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--primary);
    animation: dot-bounce 1.4s infinite ease-in-out;
  }

  .thinking-dots span:nth-child(1) { animation-delay: 0s; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Markdown rendering */
  .message code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 13px;
    color: var(--success);
  }

  .message pre {
    background: var(--bg-darker);
    padding: 12px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid var(--border-dim);
  }

  .message pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .message p { margin: 4px 0; }
  .message p:first-child { margin-top: 0; }
  .message p:last-child { margin-bottom: 0; }

  .message ul, .message ol {
    padding-left: 20px;
    margin: 4px 0;
  }

  .message strong { color: var(--secondary); font-weight: 600; }

  .message a {
    color: var(--primary);
    text-decoration: none;
    border-bottom: 1px solid var(--border-dim);
  }

  .message a:hover { border-bottom-color: var(--primary); }

  .message blockquote {
    border-left: 3px solid var(--border);
    padding-left: 12px;
    color: var(--text-emphasized);
    margin: 8px 0;
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  .welcome h2 {
    color: var(--primary);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .welcome p {
    font-size: 13px;
    max-width: 400px;
    line-height: 1.6;
  }

  /* Editor area */
  .input-area {
    padding: 0;
    background: var(--bg);
    border-top: 1px solid var(--border-dim);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    max-width: 100%;
  }

  .editor-prompt {
    color: var(--primary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 0 12px 16px;
    flex-shrink: 0;
    line-height: 1.5;
    user-select: none;
  }

  .input-wrapper textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 12px 8px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 200px;
    overflow-y: hidden;
  }

  .input-wrapper textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .send-btn {
    background: none;
    border: none;
    color: var(--primary);
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .send-btn:hover { opacity: 1; }
  .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-dim);
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-muted);
    min-height: 24px;
  }

  .status-bar-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-bar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .status-dot.disconnected { background: var(--error); }
  .status-dot.thinking { background: var(--warning); animation: pulse 1s infinite; }
  .status-dot.tool { background: var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { color: var(--text-muted); }
  .status-text.thinking { color: var(--warning); }
  .status-text.tool { color: var(--accent); }
  .status-text.disconnected { color: var(--error); }

  .status-hint {
    color: var(--text-muted);
    opacity: 0.6;
  }

  .status-hint kbd {
    background: var(--bg-darker);
    padding: 0 4px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 10px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 8px 12px; }
    .messages { padding: 12px; }
    .editor-prompt { padding-left: 12px; }
    .status-bar { padding: 3px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>shellia</h1>
    <span class="version">web</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="resetChat()" title="New conversation">reset</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h2>shellia</h2>
    <p>Terminal agent accessible via web. Type a message to start a conversation.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <span class="editor-prompt">&gt;</span>
    <textarea
      id="input"
      placeholder="Type a message..."
      rows="1"
      autofocus
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#x27A4;</button>
  </div>
</div>

<div class="status-bar">
  <div class="status-bar-left">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">connected</span>
  </div>
  <div class="status-bar-right">
    <span class="status-hint"><kbd>enter</kbd> send &middot; <kbd>shift+enter</kbd> newline</span>
  </div>
</div>

<script>
(function() {
  // --- State ---
  let sessionId = localStorage.getItem('shellia_session_id') || generateId();
  let isStreaming = false;

  localStorage.setItem('shellia_session_id', sessionId);

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // --- Event Listeners ---
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', autoResize);

  // --- Functions ---
  function generateId() {
    return 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    const newHeight = Math.min(inputEl.scrollHeight, 200);
    inputEl.style.height = newHeight + 'px';
    inputEl.style.overflowY = inputEl.scrollHeight > 200 ? 'auto' : 'hidden';
  }

  function setStatus(status, label) {
    statusDot.className = 'status-dot' + (status ? ' ' + status : '');
    statusText.className = 'status-text' + (status ? ' ' + status : '');
    if (status === 'thinking') {
      statusText.textContent = 'thinking...';
    } else if (status === 'tool') {
      statusText.textContent = label || 'running tool...';
    } else if (status === 'disconnected') {
      statusText.textContent = 'disconnected';
    } else {
      statusText.textContent = 'connected';
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'message ' + role;

    const label = document.createElement('div');
    label.className = 'role-label';
    label.textContent = role === 'user' ? 'you' : 'shellia';
    div.appendChild(label);

    const body = document.createElement('div');
    body.className = 'content';
    if (role === 'assistant') {
      body.innerHTML = renderMarkdown(content);
    } else {
      body.textContent = content;
    }
    div.appendChild(body);

    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addThinking() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'thinking';
    div.id = 'thinking';
    div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div> Thinking...';
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  function addToolCall(info) {
    const div = document.createElement('div');
    div.className = 'tool-call';
    div.innerHTML = '<span class="label">$ </span>' + escapeHtml(info);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addError(msg) {
    const div = document.createElement('div');
    div.className = 'message error';
    div.textContent = msg;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  // --- Markdown Rendering (basic) ---
  function renderMarkdown(text) {
    if (!text) return '';

    // Escape HTML first
    let html = escapeHtml(text);

    // Code blocks (``` ... ```)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Blockquotes
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered lists
    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

    // Headers
    html = html.replace(/^### (.+)$/gm, '<strong>$1</strong>');
    html = html.replace(/^## (.+)$/gm, '<strong>$1</strong>');
    html = html.replace(/^# (.+)$/gm, '<strong>$1</strong>');

    // Paragraphs (double newline)
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';

    // Single newlines to <br> (but not inside pre/code)
    html = html.replace(/(?<!<\/pre>|<\/code>)\n(?!<)/g, '<br>');

    // Clean up empty paragraphs
    html = html.replace(/<p>\s*<\/p>/g, '');

    return html;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // --- Persistence ---
  function saveMessages() {
    const msgs = [];
    messagesEl.querySelectorAll('.message').forEach(function(el) {
      const role = el.classList.contains('user') ? 'user' : 'assistant';
      const contentEl = el.querySelector('.content');
      if (!contentEl) return;
      // Store the raw text for user, rendered HTML for assistant
      if (role === 'user') {
        msgs.push({ role: role, content: contentEl.textContent });
      } else {
        msgs.push({ role: role, html: contentEl.innerHTML });
      }
    });
    localStorage.setItem('shellia_messages_' + sessionId, JSON.stringify(msgs));
  }

  function loadMessages() {
    const stored = localStorage.getItem('shellia_messages_' + sessionId);
    if (!stored) return;
    try {
      const msgs = JSON.parse(stored);
      if (!msgs || !msgs.length) return;

      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      msgs.forEach(function(msg) {
        const div = document.createElement('div');
        div.className = 'message ' + msg.role;

        const label = document.createElement('div');
        label.className = 'role-label';
        label.textContent = msg.role === 'user' ? 'you' : 'shellia';
        div.appendChild(label);

        const body = document.createElement('div');
        body.className = 'content';
        if (msg.role === 'user') {
          body.textContent = msg.content;
        } else {
          body.innerHTML = msg.html || renderMarkdown(msg.content || '');
        }
        div.appendChild(body);

        messagesEl.appendChild(div);
      });
      scrollToBottom();
    } catch (e) {
      // Ignore corrupted data
    }
  }

  function setStreaming(value) {
    isStreaming = value;
    sendBtn.disabled = value;
  }

  // --- API ---
  window.sendMessage = async function() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    setStreaming(true);
    inputEl.value = '';
    autoResize();

    addMessage('user', text);
    saveMessages();
    const thinkingEl = addThinking();
    setStatus('thinking');

    let responseText = '';
    let assistantEl = null;
    let thinkingRemoved = false;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!response.ok) {
        throw new Error('Server error: ' + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6);
          if (!jsonStr) continue;

          try {
            const event = JSON.parse(jsonStr);
            handleEvent(event);
          } catch (e) {
            // Ignore malformed events
          }
        }
      }
    } catch (err) {
      removeThinking();
      addError('Connection error: ' + err.message);
    } finally {
      setStreaming(false);
      setStatus('');
      inputEl.focus();
    }

    function handleEvent(event) {
      switch (event.type) {
        case 'session':
          if (event.session_id) {
            sessionId = event.session_id;
            localStorage.setItem('shellia_session_id', sessionId);
          }
          break;

        case 'status':
          if (event.status === 'thinking') {
            setStatus('thinking');
          }
          break;

        case 'tool_call':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          addToolCall(event.command || event.name || 'tool call');
          setStatus('tool', 'running ' + (event.name || 'tool') + '...');
          break;

        case 'tool_start':
          setStatus('tool', 'running ' + (event.name || 'tool') + '...');
          break;

        case 'tool_end':
          setStatus('thinking');
          break;

        case 'text':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          responseText += (responseText ? '\n' : '') + event.content;
          if (!assistantEl) {
            assistantEl = addMessage('assistant', responseText);
          } else {
            const contentEl = assistantEl.querySelector('.content');
            contentEl.innerHTML = renderMarkdown(responseText);
            scrollToBottom();
          }
          break;

        case 'error':
          removeThinking();
          thinkingRemoved = true;
          addError(event.message || 'Unknown error');
          break;

        case 'done':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          setStatus('');
          saveMessages();
          break;

        case 'close':
          setStatus('');
          break;
      }
    }
  };

  window.resetChat = async function() {
    try {
      await fetch('/api/chat/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch (e) {
      // Ignore errors
    }

    localStorage.removeItem('shellia_messages_' + sessionId);

    sessionId = generateId();
    localStorage.setItem('shellia_session_id', sessionId);

    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <h2>shellia</h2>
        <p>Terminal agent accessible via web. Type a message to start a conversation.</p>
      </div>
    `;
  };

  // --- Initialize ---
  loadMessages();

  // --- Health check ---
  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      if (r.ok) {
        if (!isStreaming) setStatus('');
      } else {
        setStatus('disconnected');
      }
    } catch (e) {
      setStatus('disconnected');
    }
  }

  checkHealth();
  setInterval(checkHealth, 30000);
})();
</script>
</body>
</html>
