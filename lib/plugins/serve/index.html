<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shellia</title>
<style>
  :root {
    --bg: #1a1a1a;
    --bg-secondary: #232323;
    --bg-darker: #111111;
    --bg-input: #232323;
    --bg-input-border: #333333;
    --bg-bubble: #2a2a2a;
    --text: #e8e8e8;
    --text-muted: #666666;
    --text-secondary: #999999;
    --primary: #e8e8e8;
    --accent: #d4a0d0;
    --secondary: #7eb8f7;
    --border: #2a2a2a;
    --border-dim: #222222;
    --error: #e06c75;
    --success: #7fd88f;
    --warning: #f5a742;
    --info: #56b6c2;
    --code-bg: #141414;
    --scrollbar: #2a2a2a;
    --scrollbar-hover: #3a3a3a;
    --send-bg: #e8e8e8;
    --send-fg: #1a1a1a;
    --input-area-height: 84px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    padding-bottom: calc(var(--input-area-height) + 8px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  /* Message row wrapper */
  .message-row {
    display: flex;
    flex-direction: column;
    max-width: 80%;
  }

  .message-row.user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message-row.assistant {
    align-self: flex-start;
    align-items: flex-start;
  }

  /* Message bubble */
  .message {
    font-size: 14px;
    line-height: 1.65;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .message-row.user .message {
    background: var(--bg-bubble);
    border: 1px solid var(--bg-input-border);
    border-radius: 16px;
    padding: 12px 18px;
  }

  .message-row.assistant .message {
    padding: 4px 0;
  }

  .message-row.error .message {
    color: var(--error);
    font-size: 13px;
  }

  /* Message meta (datetime + copy) */
  .message-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .message-row:hover .message-meta {
    opacity: 1;
  }

  .message-meta .datetime {
    color: var(--text-muted);
  }

  .message-meta .meta-separator {
    color: var(--text-muted);
    opacity: 0.4;
  }

  .btn-copy {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .btn-copy:hover {
    color: var(--text-secondary);
  }

  .btn-copy svg {
    width: 14px;
    height: 14px;
  }

  /* Tool call indicator */
  .tool-call {
    font-size: 13px;
    color: var(--text-muted);
    padding: 6px 0;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Menlo', monospace;
    max-width: 80%;
    align-self: flex-start;
  }

  .tool-call .label {
    font-weight: 600;
    color: var(--warning);
  }

  /* Thinking indicator */
  .thinking {
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
  }

  .thinking-dots span {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: dot-bounce 1.4s infinite ease-in-out;
  }

  .thinking-dots span:nth-child(1) { animation-delay: 0s; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Markdown rendering */
  .message code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Menlo', monospace;
    color: var(--accent);
  }

  .message pre {
    background: var(--bg-darker);
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 10px 0;
    border: 1px solid var(--border);
  }

  .message pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .message p { margin: 4px 0; }
  .message p:first-child { margin-top: 0; }
  .message p:last-child { margin-bottom: 0; }

  .message ul, .message ol {
    padding-left: 20px;
    margin: 4px 0;
  }

  .message strong { color: var(--text); font-weight: 600; }

  .message a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }

  .message a:hover { border-bottom-color: var(--accent); }

  .message blockquote {
    border-left: 2px solid var(--border);
    padding-left: 12px;
    color: var(--text-secondary);
    margin: 8px 0;
  }

  .message h3, .message h4, .message h5 {
    margin: 12px 0 6px 0;
    color: var(--text);
    line-height: 1.4;
  }
  .message h3 { font-size: 16px; }
  .message h4 { font-size: 15px; }
  .message h5 { font-size: 14px; }
  .message h3:first-child, .message h4:first-child, .message h5:first-child { margin-top: 0; }

  .message table {
    border-collapse: collapse;
    margin: 10px 0;
    width: auto;
    font-size: 13px;
  }

  .message th, .message td {
    border: 1px solid var(--border);
    padding: 6px 12px;
    text-align: left;
  }

  .message th {
    background: var(--bg-darker);
    font-weight: 600;
    color: var(--text);
  }

  .message td {
    background: var(--bg-secondary);
  }

  .message hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }

  .message del {
    color: var(--text-muted);
    text-decoration: line-through;
  }

  .message .task-item {
    list-style: none;
    margin-left: -20px;
  }

  .message .task-item input[type="checkbox"] {
    margin-right: 6px;
    pointer-events: none;
  }

  .message pre .code-lang {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }

  .welcome-icon {
    width: 48px;
    height: 48px;
    border: 2px solid var(--text-secondary);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .welcome-icon-inner {
    width: 20px;
    height: 20px;
    background: var(--text-secondary);
    border-radius: 4px;
  }

  .welcome h2 {
    color: var(--text);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .welcome p {
    font-size: 14px;
    max-width: 420px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  /* Input area */
  .input-area {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10;
    padding: 16px 24px calc(16px + env(safe-area-inset-bottom));
    background: transparent;
    flex-shrink: 0;
  }

  .input-container {
    background: var(--bg-input);
    border: 1px solid var(--bg-input-border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-container:focus-within {
    border-color: #444444;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    padding: 4px;
  }

  .input-wrapper textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 200px;
    overflow-y: hidden;
  }

  .input-wrapper textarea::placeholder {
    color: var(--text-muted);
  }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px 4px 0;
  }

  .send-btn {
    background: var(--send-bg);
    border: none;
    color: var(--send-fg);
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    opacity: 0.85;
  }

  .send-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
  }

  .send-btn svg {
    width: 16px;
    height: 16px;
  }

  /* Header - minimal */
  .header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 10px 20px;
    flex-shrink: 0;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-reset {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .btn-reset:hover {
    border-color: #444;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.03);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .messages { padding: 16px; }
    .messages { padding-bottom: calc(var(--input-area-height) + 8px + env(safe-area-inset-bottom)); }
    .input-area { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); }
    .message-row { max-width: 90%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-actions">
    <button class="btn-reset" onclick="resetChat()" title="New conversation">New chat</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">
      <div class="welcome-icon-inner"></div>
    </div>
    <h2>Build anything</h2>
    <p>Terminal agent accessible via web. Type a message to start a conversation.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-container">
    <div class="input-wrapper">
      <textarea
        id="input"
        placeholder="Type a message..."
        rows="1"
        autofocus
      ></textarea>
      <div class="input-actions">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // --- State ---
  let sessionId = localStorage.getItem('shellia_session_id') || generateId();
  let isStreaming = false;

  localStorage.setItem('shellia_session_id', sessionId);

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  const COPY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  const CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  // --- Event Listeners ---
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', autoResize);

  // --- Functions ---
  function generateId() {
    return 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    const newHeight = Math.min(inputEl.scrollHeight, 200);
    inputEl.style.height = newHeight + 'px';
    inputEl.style.overflowY = inputEl.scrollHeight > 200 ? 'auto' : 'hidden';
  }

  function formatTime(date) {
    var month = date.toLocaleString([], { month: 'short' });
    var day = date.getDate();
    var time = date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    return month + ' ' + day + ', ' + time;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function copyMessageContent(btn, text) {
    function onSuccess() {
      btn.innerHTML = CHECK_ICON;
      btn.style.color = 'var(--success)';
      setTimeout(function() {
        btn.innerHTML = COPY_ICON;
        btn.style.color = '';
      }, 1500);
    }

    // Try modern clipboard API first, fall back to execCommand
    try {
      if (typeof navigator !== 'undefined' && navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
        navigator.clipboard.writeText(text).then(onSuccess).catch(function() {
          fallbackCopy(text, onSuccess);
        });
      } else {
        fallbackCopy(text, onSuccess);
      }
    } catch (e) {
      fallbackCopy(text, onSuccess);
    }
  }

  function fallbackCopy(text, callback) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    textarea.style.top = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      callback();
    } catch (e) {
      // Silent fail
    }
    document.body.removeChild(textarea);
  }

  function createMessageMeta(rawText, timestamp) {
    const meta = document.createElement('div');
    meta.className = 'message-meta';

    const dt = document.createElement('span');
    dt.className = 'datetime';
    dt.textContent = formatTime(timestamp);
    meta.appendChild(dt);

    const sep = document.createElement('span');
    sep.className = 'meta-separator';
    sep.textContent = '\u00B7';
    meta.appendChild(sep);

    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn-copy';
    copyBtn.title = 'Copy';
    copyBtn.innerHTML = COPY_ICON;
    copyBtn.addEventListener('click', function() {
      copyMessageContent(copyBtn, rawText);
    });
    meta.appendChild(copyBtn);

    return meta;
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const timestamp = new Date();

    const row = document.createElement('div');
    row.className = 'message-row ' + role;
    row.dataset.timestamp = timestamp.toISOString();
    row.dataset.rawContent = content;

    const bubble = document.createElement('div');
    bubble.className = 'message';

    const body = document.createElement('div');
    body.className = 'content';
    if (role === 'assistant') {
      body.innerHTML = renderMarkdown(content);
    } else {
      body.textContent = content;
    }
    bubble.appendChild(body);
    row.appendChild(bubble);

    const meta = createMessageMeta(content, timestamp);
    row.appendChild(meta);

    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function addThinking() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'thinking';
    div.id = 'thinking';
    div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div> Thinking...';
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  function addToolCall(info) {
    const div = document.createElement('div');
    div.className = 'tool-call';
    div.innerHTML = '<span class="label">$ </span>' + escapeHtml(info);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addError(msg) {
    const row = document.createElement('div');
    row.className = 'message-row error';

    const bubble = document.createElement('div');
    bubble.className = 'message';
    bubble.textContent = msg;
    row.appendChild(bubble);

    messagesEl.appendChild(row);
    scrollToBottom();
  }

  // --- Markdown Rendering ---
  function renderMarkdown(text) {
    if (!text) return '';

    // Escape HTML first
    let html = escapeHtml(text);

    // Code blocks (``` ... ```) — extract and protect from further processing
    var codeBlocks = [];
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      var langLabel = lang ? '<span class="code-lang">' + lang + '</span>' : '';
      var placeholder = '%%CODEBLOCK_' + codeBlocks.length + '%%';
      codeBlocks.push('<pre><code>' + langLabel + code.trim() + '</code></pre>');
      return placeholder;
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Tables: detect header | sep | rows pattern
    html = html.replace(/((?:^\|.+\|$\n?)+)/gm, function(block) {
      var rows = block.trim().split('\n');
      if (rows.length < 2) return block;
      // Check for separator row (|---|---|)
      var sepIdx = -1;
      for (var i = 0; i < rows.length; i++) {
        if (/^\|[\s\-:|]+\|$/.test(rows[i])) { sepIdx = i; break; }
      }
      if (sepIdx < 1) return block;

      var parseRow = function(row) {
        return row.split('|').slice(1, -1).map(function(c) { return c.trim(); });
      };

      var headerCells = parseRow(rows[sepIdx - 1]);
      var thead = '<thead><tr>' + headerCells.map(function(c) { return '<th>' + c + '</th>'; }).join('') + '</tr></thead>';
      var bodyRows = rows.slice(sepIdx + 1).filter(function(r) { return r.trim().length > 0; });
      var tbody = '<tbody>' + bodyRows.map(function(r) {
        var cells = parseRow(r);
        return '<tr>' + cells.map(function(c) { return '<td>' + c + '</td>'; }).join('') + '</tr>';
      }).join('') + '</tbody>';
      return '<table>' + thead + tbody + '</table>';
    });

    // Horizontal rules
    html = html.replace(/^(---+|\*\*\*+|___+)$/gm, '<hr>');

    // Task lists (must come before generic lists)
    html = html.replace(/^[-*] \[x\] (.+)$/gm, '<li class="task-item"><input type="checkbox" checked disabled> $1</li>');
    html = html.replace(/^[-*] \[ \] (.+)$/gm, '<li class="task-item"><input type="checkbox" disabled> $1</li>');

    // Bold + italic combined
    html = html.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');

    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');

    // Strikethrough
    html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Blockquotes (merge consecutive lines)
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

    // Ordered lists
    html = html.replace(/^(\d+)\. (.+)$/gm, '<li data-ol>$2</li>');
    html = html.replace(/((?:<li data-ol>.*<\/li>\n?)+)/g, '<ol>$1</ol>');
    html = html.replace(/ data-ol/g, '');

    // Unordered lists (non-task items only)
    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/((?:<li(?:\s[^>]*)?>.*<\/li>\n?)+)/g, function(match) {
      // Don't double-wrap if already inside <ol>
      if (match.indexOf('<ol>') !== -1) return match;
      return '<ul>' + match + '</ul>';
    });

    // Headers (use h3-h5 to stay proportionate inside chat bubbles)
    html = html.replace(/^### (.+)$/gm, '<h5>$1</h5>');
    html = html.replace(/^## (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^# (.+)$/gm, '<h3>$1</h3>');

    // Paragraphs (double newline)
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';

    // Single newlines to <br> (but not after block elements)
    html = html.replace(/(?<!<\/pre>|<\/code>|<\/table>|<\/h[345]>|<\/ul>|<\/ol>|<hr>|<\/blockquote>)\n(?!<)/g, '<br>');

    // Restore code blocks
    for (var i = 0; i < codeBlocks.length; i++) {
      html = html.replace('%%CODEBLOCK_' + i + '%%', codeBlocks[i]);
    }

    // Clean up empty paragraphs and paragraphs wrapping block elements
    html = html.replace(/<p>\s*<\/p>/g, '');
    html = html.replace(/<p>\s*(<(?:pre|table|h[345]|ul|ol|hr|blockquote)[^>]*>)/g, '$1');
    html = html.replace(/(<\/(?:pre|table|h[345]|ul|ol|blockquote)>|<hr>)\s*<\/p>/g, '$1');

    return html;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // --- Persistence ---
  function saveMessages() {
    const msgs = [];
    messagesEl.querySelectorAll('.message-row').forEach(function(row) {
      const role = row.classList.contains('user') ? 'user' : 'assistant';
      const contentEl = row.querySelector('.content');
      if (!contentEl) return;
      const ts = row.dataset.timestamp || new Date().toISOString();
      if (role === 'user') {
        msgs.push({ role: role, content: contentEl.textContent, timestamp: ts });
      } else {
        msgs.push({ role: role, html: contentEl.innerHTML, rawContent: row.dataset.rawContent || '', timestamp: ts });
      }
    });
    localStorage.setItem('shellia_messages_' + sessionId, JSON.stringify(msgs));
  }

  function loadMessages() {
    const stored = localStorage.getItem('shellia_messages_' + sessionId);
    if (!stored) return;
    try {
      const msgs = JSON.parse(stored);
      if (!msgs || !msgs.length) return;

      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      msgs.forEach(function(msg) {
        const timestamp = msg.timestamp ? new Date(msg.timestamp) : new Date();

        const row = document.createElement('div');
        row.className = 'message-row ' + msg.role;
        row.dataset.timestamp = timestamp.toISOString();

        const bubble = document.createElement('div');
        bubble.className = 'message';

        const body = document.createElement('div');
        body.className = 'content';
        if (msg.role === 'user') {
          body.textContent = msg.content;
          row.dataset.rawContent = msg.content;
        } else {
          body.innerHTML = msg.html || renderMarkdown(msg.content || '');
          row.dataset.rawContent = msg.rawContent || msg.content || '';
        }
        bubble.appendChild(body);
        row.appendChild(bubble);

        const rawText = msg.role === 'user' ? msg.content : (msg.rawContent || msg.content || '');
        const meta = createMessageMeta(rawText, timestamp);
        row.appendChild(meta);

        messagesEl.appendChild(row);
      });
      scrollToBottom();
    } catch (e) {
      // Ignore corrupted data
    }
  }

  function setStreaming(value) {
    isStreaming = value;
    sendBtn.disabled = value;
  }

  // --- API ---
  window.sendMessage = async function() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    setStreaming(true);
    inputEl.value = '';
    autoResize();

    addMessage('user', text);
    saveMessages();
    const thinkingEl = addThinking();

    let responseText = '';
    let assistantRow = null;
    let thinkingRemoved = false;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!response.ok) {
        throw new Error('Server error: ' + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6);
          if (!jsonStr) continue;

          try {
            const event = JSON.parse(jsonStr);
            handleEvent(event);
          } catch (e) {
            // Ignore malformed events
          }
        }
      }
    } catch (err) {
      removeThinking();
      addError('Connection error: ' + err.message);
    } finally {
      setStreaming(false);
      inputEl.focus();
    }

    function handleEvent(event) {
      switch (event.type) {
        case 'session':
          if (event.session_id) {
            sessionId = event.session_id;
            localStorage.setItem('shellia_session_id', sessionId);
          }
          break;

        case 'status':
          break;

        case 'tool_call':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          addToolCall(event.command || event.name || 'tool call');
          break;

        case 'text':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          responseText += (responseText ? '\n' : '') + event.content;
          if (!assistantRow) {
            assistantRow = addMessage('assistant', responseText);
          } else {
            const contentEl = assistantRow.querySelector('.content');
            contentEl.innerHTML = renderMarkdown(responseText);
            // Update rawContent and copy button reference
            assistantRow.dataset.rawContent = responseText;
            const copyBtn = assistantRow.querySelector('.btn-copy');
            if (copyBtn) {
              // Re-bind copy with updated text
              copyBtn.onclick = function() { copyMessageContent(copyBtn, responseText); };
            }
            scrollToBottom();
          }
          break;

        case 'error':
          removeThinking();
          thinkingRemoved = true;
          addError(event.message || 'Unknown error');
          break;

        case 'done':
          if (!thinkingRemoved) {
            removeThinking();
            thinkingRemoved = true;
          }
          saveMessages();
          break;

        case 'close':
          break;
      }
    }
  };

  window.resetChat = async function() {
    try {
      await fetch('/api/chat/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch (e) {
      // Ignore errors
    }

    localStorage.removeItem('shellia_messages_' + sessionId);

    sessionId = generateId();
    localStorage.setItem('shellia_session_id', sessionId);

    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <div class="welcome-icon-inner"></div>
        </div>
        <h2>Build anything</h2>
        <p>Terminal agent accessible via web. Type a message to start a conversation.</p>
      </div>
    `;
  };

  // --- Initialize ---
  loadMessages();

  // --- Health check ---
  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      if (!r.ok) {
        // Could show a subtle indicator if needed
      }
    } catch (e) {
      // Silent health check
    }
  }

  checkHealth();
  setInterval(checkHealth, 30000);
})();
</script>
